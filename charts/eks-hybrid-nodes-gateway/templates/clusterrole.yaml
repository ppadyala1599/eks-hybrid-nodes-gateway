apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "eks-hybrid-nodes-gateway.fullname" . }}
  labels:
    {{- include "eks-hybrid-nodes-gateway.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["cilium.io"]
    resources: ["ciliumnodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["cilium.io"]
    resources: ["ciliumvtepconfigs"]
    verbs: ["get", "list", "watch", "create", "update"]
